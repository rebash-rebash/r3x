<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="edgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="94" ry="94" fill="none" stroke="url(#edgeGlow)" stroke-width="2"/>

  <!-- Background glow behind text -->
  <text x="256" y="300" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="200" font-weight="900" fill="#58a6ff" letter-spacing="-8" filter="url(#softGlow)" opacity="0.15">
    r3x
  </text>

  <!-- Main r3x text -->
  <text x="256" y="300" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="200" font-weight="900" fill="url(#textGrad)" letter-spacing="-8" filter="url(#glow)">
    r3x
  </text>

  <!-- Underline accent -->
  <rect x="100" y="330" width="312" height="3" rx="1.5" fill="url(#textGrad)" opacity="0.5"/>
</svg>
